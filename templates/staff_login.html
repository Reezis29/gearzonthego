<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | Gearz On The Go</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
        <div class="text-center mb-6">
            <img src="/static/logo.png" alt="Gearz On The Go" class="h-16 mx-auto mb-3">
            <h1 class="text-xl font-bold text-gray-800">Staff Panel</h1>
            <p class="text-gray-500 text-sm">Masukkan password untuk akses</p>
        </div>
        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}
        <form method="POST">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Masukkan password staff">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition">
                <i class="fas fa-sign-in-alt mr-2"></i> Log Masuk
            </button>
        </form>
        <div class="mt-4 text-center">
            <a href="/" class="text-sm text-gray-400 hover:text-blue-600 transition">
                <i class="fas fa-arrow-left mr-1"></i> Back ke Laman Utama
            </a>
        </div>
    </div>
</body>
</html>
